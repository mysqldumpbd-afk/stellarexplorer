// Audio engine
let _AC=null;
function _ac(){ if(!_AC||_AC.state==="closed") _AC=new(window.AudioContext||window.webkitAudioContext)(); return _AC; }
function _note(f,t,dur,vol,tp){
  try{
    const ac=_ac(),osc=ac.createOscillator(),gn=ac.createGain();
    osc.connect(gn); gn.connect(ac.destination);
    osc.type=tp||"sine"; osc.frequency.value=f;
    const ts=ac.currentTime+t;
    gn.gain.setValueAtTime(0,ts);
    gn.gain.linearRampToValueAtTime(vol||0.15,ts+0.01);
    gn.gain.exponentialRampToValueAtTime(0.001,ts+dur);
    osc.start(ts); osc.stop(ts+dur+0.02);
  }catch(e){}
}
function _drum(freq,t,dur){
  try{
    const ac=_ac(),buf=ac.createBuffer(1,Math.ceil(ac.sampleRate*dur),ac.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);
    const src=ac.createBufferSource(),gn=ac.createGain(),fl=ac.createBiquadFilter();
    src.buffer=buf; fl.type="lowpass"; fl.frequency.value=freq||300;
    src.connect(fl); fl.connect(gn); gn.connect(ac.destination);
    const ts=ac.currentTime+t;
    gn.gain.setValueAtTime(0.3,ts); gn.gain.exponentialRampToValueAtTime(0.001,ts+dur);
    src.start(ts);
  }catch(e){}
}

// Market Tab
function MarketTab({resSlots,unlocked,ownedPerks,boughtNC,consumablesUsed,onBuy,onUsePerk,extraDice}){
  const [activeType,setActiveType]=useState("permanent");
  const meta=PERK_TYPE_META[activeType];
  const perks=activeType==="dice"?null:PERKS[activeType];
  const permCount=ownedPerks.filter(p=>p.type==="permanent").length;
  return(
    <div>
      <div style={{padding:"8px 10px",borderRadius:8,border:"1px solid #1a3a55",background:"rgba(0,0,0,.2)",marginBottom:12}}>
        <div style={{fontFamily:"Orbitron,monospace",fontSize:7,color:"#3a6080",letterSpacing:1,marginBottom:4}}>REGLAS DEL MERCADO</div>
        <div style={{fontFamily:"Orbitron,monospace",fontSize:6.5,color:"#c8e8ff",lineHeight:1.9}}>

          1 permanente O 1 reutilizable{"\n"}
          Consumibles sin limite{"\n"}
          Usar por turno:{"\n"}

          Cada reutilizable 1 vez{"\n"}

        {Object.entries(PERK_TYPE_META).map(([type,m])=>(
          <div key={type} onClick={()=>setActiveType(type)} style={{flex:1,padding:"7px 4px",borderRadius:8,textAlign:"center",border:"1.5px solid "+(activeType===type?m.color:"#1a3a55"),background:activeType===type?"rgba("+rgb(m.color)+",.1)":"transparent",cursor:"pointer",userSelect:"none",WebkitTapHighlightColor:"transparent"}}>
            <div style={{fontSize:16,lineHeight:1,marginBottom:2}}>{m.emoji}</div>
            <div style={{fontFamily:"Orbitron,monospace",fontSize:6,color:activeType===type?m.color:"#3a6080"}}>{m.label}</div>
          </div>
        ))}
      </div>
      <div style={{fontFamily:"Orbitron,monospace",fontSize:6.5,color:"#3a6080",marginBottom:10}}>{meta.rule}</div>
      {perks&&perks.map(perk=>{
        const owned=ownedPerks.some(p=>p.id===perk.id);
        const isCons=activeType==="consumable";
        const ownedCnt=ownedPerks.filter(p=>p.id===perk.id).length;
        const canBuyMore=isCons||!owned;
        const affordable=canAfford(resSlots,perk.cost);
        const reqMet=!perk.req||perk.req.every(r=>unlocked.includes(r));
        const permFull=activeType==="permanent"&&permCount>=MAX_PERMANENT&&!owned;
        const blockNC=boughtNC>0&&activeType!=="consumable";
        const canBuy=canBuyMore&&affordable&&reqMet&&!permFull&&!blockNC;
        const usedThisTurn=ownedPerks.filter(p=>p.id===perk.id&&p.usedThisTurn).length>0;
        const canUse=owned&&!isCons&&(activeType==="permanent"||!usedThisTurn);
        return(
          <div key={perk.id} style={{marginBottom:10,padding:"10px 12px",borderRadius:10,border:"1.5px solid "+(owned?meta.color:reqMet&&affordable?"#1a3a55":"#0e2030"),background:owned?"rgba("+rgb(meta.color)+",.07)":"rgba(255,255,255,.02)",opacity:reqMet?1:.6}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
              <div style={{fontSize:26,flexShrink:0}}>{perk.emoji}</div>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
                  <span style={{fontFamily:"Orbitron,monospace",fontSize:9,fontWeight:700,color:owned?meta.color:"#c8e8ff"}}>{perk.name}</span>
                  {owned&&<span style={{fontFamily:"Orbitron,monospace",fontSize:7,color:meta.color,border:"1px solid "+meta.color,padding:"1px 4px",borderRadius:3}}>{isCons?"x"+ownedCnt:"ok"}</span>}
                </div>
                <div style={{fontFamily:"Orbitron,monospace",fontSize:7,color:"#3a6080",lineHeight:1.5,marginBottom:4}}>{perk.effect}</div>
                {perk.req&&perk.req.length>0&&<><div style={{fontFamily:"Orbitron,monospace",fontSize:6,color:"#3a6080",marginBottom:2}}>REQUIERE:</div><ReqBadge req={perk.req}/></>}
                <CostBadge cost={perk.cost}/>
                {!reqMet&&<div style={{fontFamily:"Orbitron,monospace",fontSize:6.5,color:"#ff4444",marginTop:5}}>Necesitas desbloquear planetas requeridos</div>}
                {permFull&&<div style={{fontFamily:"Orbitron,monospace",fontSize:6.5,color:"#ff4444",marginTop:5}}>Ya tienes 2 permanentes</div>}
              </div>
            </div>
            <div style={{display:"flex",gap:8,marginTop:10}}>
              {canBuyMore&&<button onClick={()=>canBuy&&onBuy(perk,activeType)} style={{flex:1,padding:"8px",borderRadius:7,border:"1.5px solid "+(canBuy?"rgba(0,200,255,.5)":"#1a3a55"),background:canBuy?"rgba(0,200,255,.1)":"transparent",fontFamily:"Orbitron,monospace",fontSize:8,color:canBuy?"#00c8ff":"#2a4060",cursor:canBuy?"pointer":"default",userSelect:"none",WebkitTapHighlightColor:"transparent"}}>
                🛒 {isCons?"COMPRAR":"ADQUIRIR"}
              </button>}
              {owned&&activeType!=="permanent"&&<button onClick={()=>canUse&&onUsePerk(perk.id,activeType)} style={{flex:1,padding:"8px",borderRadius:7,border:"1.5px solid "+(canUse?"rgba(0,255,150,.5)":"#1a3a55"),background:canUse?"rgba(0,255,150,.08)":"transparent",fontFamily:"Orbitron,monospace",fontSize:8,color:canUse?"#00ff9d":"#2a4060",cursor:canUse?"pointer":"default",userSelect:"none",WebkitTapHighlightColor:"transparent"}}>
                {activeType==="reusable"?(usedThisTurn?"USADO":"USAR"):"USAR"}
              </button>}
              {activeType==="permanent"&&owned&&<div style={{flex:1,padding:"8px",borderRadius:7,border:"1.5px solid rgba(204,102,255,.3)",background:"rgba(204,102,255,.06)",fontFamily:"Orbitron,monospace",fontSize:8,color:"#cc66ff",textAlign:"center"}}>ACTIVO</div>}
            </div>
          </div>
        );
      })}
      {activeType==="dice"&&EXTRA_DICE.map(dice=>{
        const owned=extraDice.includes(dice.id);
        const affordable=canAfford(resSlots,dice.cost);
        const canBuy=!owned&&affordable&&boughtNC===0;
        return(
          <div key={dice.id} style={{marginBottom:10,padding:"10px 12px",borderRadius:10,border:"1.5px solid "+(owned?"#ff8800":"#1a3a55"),background:owned?"rgba(255,136,0,.07)":"rgba(255,255,255,.02)"}}>
            <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
              <span style={{fontSize:28}}>{dice.emoji}</span>
              <div style={{flex:1}}>
                <div style={{fontFamily:"Orbitron,monospace",fontSize:9,fontWeight:700,color:owned?"#ff8800":"#c8e8ff",marginBottom:2}}>{dice.name} {owned&&<span style={{fontSize:7,color:"#ff8800",border:"1px solid #ff8800",padding:"1px 4px",borderRadius:3}}>ACTIVO</span>}</div>

              {owned?"DADO ACTIVO":"ADQUIRIR DADO"}
            </button>
          </div>
        );
      })}
    </div>
  );
}

// Create Lobby
function CreateLobby({player,onBack,onGameStart,play}){
  const [code]=useState(()=>genCode());
  const [lobby,setLobby]=useState(null);
  const [starting,setStarting]=useState(false);
  const [fbReady,setFbReady]=useState(true);
  const unsub=useRef(null);
  const pRgb=rgb(player.color.hex);
  useFirebase(()=>setFbReady(true));
  useEffect(()=>{
    if(!fbReady) return;
    const data={code,status:"waiting",round:1,startTime:null,players:[{name:player.name,color:player.color,ship:player.ship,pos:0,joined:Date.now()}]};
    fSet(code,data).then(()=>setLobby(data));
    unsub.current=fListen(code,d=>{ if(d) setLobby(d); });
    return()=>{ if(unsub.current) unsub.current(); };
  },[fbReady]);
  const handleStart=async()=>{
    if(!lobby) return;
    setStarting(true); play("newround");
    const lobbyPlayers=lobby.players||[];
    // Ensure host is always in players list
    const players=lobbyPlayers.length>0?lobbyPlayers:[{name:player.name,color:player.color,ship:player.ship,pos:0,joined:Date.now()}];
    const withPos=players.map((p,i)=>({...p,pos:i,planetName:i<PLANET_START_ORDER.length?PLANET_START_ORDER[i].name:"VERDIA",planetId:i<PLANET_START_ORDER.length?PLANET_START_ORDER[i].planetId:"verdia"}));
    const updated={...lobby,status:"started",startTime:Date.now(),players:withPos};
    await fSet(code,updated);
    const me=withPos[0];
    onGameStart({code,lobby:updated,myPlanetId:me.planetId,myPlanet:me.planetName,isHost:true});
  };
  const players=lobby?lobby.players:[];
  return(
    <div style={{minHeight:"100dvh",background:"#060c14",fontFamily:"'Exo 2',sans-serif",color:"#c8e8ff",padding:"20px 16px 40px",maxWidth:440,margin:"0 auto"}}>
      <style>{"@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap'); *{box-sizing:border-box} body{margin:0;background:#060c14} @keyframes pu{0%,100%{opacity:.5}50%{opacity:1}}"}</style>
      <button onClick={async()=>{ try{ await window.storage.delete(LOBBY_KEY+code,true); }catch(e){} onBack(); }} style={{background:"transparent",border:"none",color:"#3a6080",fontFamily:"Orbitron,monospace",fontSize:8,cursor:"pointer",marginBottom:16,padding:0}}>← VOLVER</button>
      <div style={{fontFamily:"Orbitron,monospace",fontSize:9,letterSpacing:3,color:"#3a6080",marginBottom:4}}>CREAR PARTIDA</div>
      <div style={{fontFamily:"Orbitron,monospace",fontSize:18,fontWeight:900,color:player.color.hex,marginBottom:20}}>{player.ship} {player.name}</div>
      <div style={{textAlign:"center",padding:"20px 16px",borderRadius:14,border:"2px solid rgba("+pRgb+",.4)",background:"rgba("+pRgb+",.06)",marginBottom:20}}>
        <div style={{fontFamily:"Orbitron,monospace",fontSize:8,color:"#3a6080",letterSpacing:3,marginBottom:8}}>CODIGO DE PARTIDA</div>
        <div style={{fontFamily:"Orbitron,monospace",fontSize:44,fontWeight:900,color:player.color.hex,letterSpacing:10,lineHeight:1}}>{code}</div>
        <div style={{fontFamily:"Orbitron,monospace",fontSize:7,color:"#3a6080",marginTop:8,letterSpacing:2}}>Comparte con los demas jugadores</div>
      </div>
      {!fbReady&&<div style={{textAlign:"center",fontFamily:"Orbitron,monospace",fontSize:8,color:"#3a6080",animation:"pu 1.2s ease infinite",marginBottom:12}}>CONECTANDO...</div>}
      <div style={{background:"rgba(255,255,255,.02)",border:"1px solid #1a3a55",borderRadius:10,padding:"14px 12px",marginBottom:20}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
          <div style={{fontFamily:"Orbitron,monospace",fontSize:8,letterSpacing:3,color:"#3a6080"}}>JUGADORES</div>
          <div style={{fontFamily:"Orbitron,monospace",fontSize:8,color:player.color.hex}}>{players.length}</div>
        </div>
        {players.map((p,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:8,border:"1px solid rgba("+rgb(p.color?p.color.hex:"#00c8ff")+",.25)",background:"rgba("+rgb(p.color?p.color.hex:"#00c8ff")+",.06)",marginBottom:5}}>
            <span style={{fontSize:22}}>{p.ship}</span>
            <div style={{flex:1}}>
              <div style={{fontFamily:"Orbitron,monospace",fontSize:10,fontWeight:700,color:p.color?p.color.hex:"#00c8ff"}}>{p.name}</div>
              <div style={{fontFamily:"Orbitron,monospace",fontSize:6,color:"#3a6080",marginTop:2}}>J{i+1} - {i<PLANET_START_ORDER.length?PLANET_START_ORDER[i].name+" ("+PLANET_START_ORDER[i].note+")":"Extra"}</div>
            </div>
            {i===0&&<div style={{fontFamily:"Orbitron,monospace",fontSize:6,color:player.color.hex,border:"1px solid "+player.color.hex,padding:"2px 5px",borderRadius:3}}>HOST</div>}
            <div style={{width:8,height:8,borderRadius:"50%",background:"#00ff9d"}}/>
          </div>
        ))}
        {players.length<5&&<div style={{textAlign:"center",padding:"8px 0",fontFamily:"Orbitron,monospace",fontSize:7,color:"#1a3a55",animation:"pu 1.5s ease infinite"}}>ESPERANDO JUGADORES...</div>}
      </div>
      <button onClick={handleStart} disabled={starting||!fbReady||!lobby}
        style={{width:"100%",padding:"16px",borderRadius:10,border:"2px solid "+(fbReady&&lobby?player.color.hex:"#1a3a55"),background:fbReady&&lobby?"rgba("+pRgb+",.14)":"transparent",fontFamily:"Orbitron,monospace",fontSize:12,letterSpacing:3,color:fbReady&&lobby?player.color.hex:"#2a4060",cursor:fbReady&&lobby?"pointer":"default",fontWeight:900,userSelect:"none",WebkitTapHighlightColor:"transparent"}}>
        {!fbReady?"CONECTANDO...":starting?"INICIANDO...":"INICIAR PARTIDA"}
      </button>
      <button onClick={async()=>{ try{ await window.storage.delete(LOBBY_KEY+code,true); }catch(e){} onBack(); }}
        style={{width:"100%",padding:"12px",borderRadius:10,border:"1px solid #1a3a55",background:"transparent",fontFamily:"Orbitron,monospace",fontSize:10,letterSpacing:3,color:"#3a6080",cursor:"pointer",marginTop:8,userSelect:"none",WebkitTapHighlightColor:"transparent"}}>
        CANCELAR PARTIDA
      </button>
    </div>
  );
}

// Join Lobby
function JoinLobby({player,onBack,onGameStart,play}){
  const [code,setCode]=useState("");
  const [status,setStatus]=useState("idle");
  const [lobby,setLobby]=useState(null);
  const [err,setErr]=useState("");
  const [fbReady,setFbReady]=useState(true);
  const unsub=useRef(null);
  useFirebase(()=>setFbReady(true));
  const handleJoin=async()=>{
    if(code.length!==6){ setErr("El codigo debe tener 6 digitos"); return; }
    setStatus("joining"); setErr("");
    const data=await fGet(code);
    if(!data){ setStatus("error"); setErr("Codigo no encontrado. Asegurate de estar en la misma sesion del artifact."); return; }
    if(data.status==="started"){ setStatus("error"); setErr("La partida ya comenzo"); return; }
    if((data.players||[]).length>=5){ setStatus("error"); setErr("Sala llena"); return; }
    const me={name:player.name,color:player.color,ship:player.ship,pos:null,joined:Date.now()};
    const players=[...(data.players||[]),me];
    await fUpd(code,{players});
    setLobby({...data,players}); setStatus("waiting");
    unsub.current=fListen(code,d=>{
      if(!d) return;
      setLobby(d);
      if(d.status==="started"){
        if(unsub.current) unsub.current();
        const found=(d.players||[]).find(p=>p.name===player.name&&p.ship===player.ship);
        play("newround");
        onGameStart({code,lobby:d,myPlanetId:found?found.planetId:"verdia",myPlanet:found?found.planetName:"VERDIA",isHost:false});
      }
    });
  };
  useEffect(()=>()=>{ if(unsub.current) unsub.current(); },[]);
  if(status==="waiting"&&lobby) return(
    <div style={{minHeight:"100dvh",background:"#060c14",fontFamily:"'Exo 2',sans-serif",color:"#c8e8ff",padding:"20px 16px 40px",maxWidth:440,margin:"0 auto"}}>
      <style>{"@keyframes pu{0%,100%{opacity:.5}50%{opacity:1}}"}</style>
      <button onClick={()=>{ if(unsub.current) unsub.current(); setStatus("idle"); setLobby(null); }} style={{background:"transparent",border:"none",color:"#3a6080",fontFamily:"Orbitron,monospace",fontSize:8,cursor:"pointer",marginBottom:16,padding:0}}>← SALIR DE SALA</button>
      <div style={{textAlign:"center",marginBottom:24,marginTop:32}}>
        <div style={{fontSize:44,marginBottom:8,animation:"pu 1.5s ease infinite"}}>{player.ship}</div>
        <div style={{fontFamily:"Orbitron,monospace",fontSize:16,fontWeight:900,color:player.color.hex}}>{player.name}</div>
        <div style={{fontFamily:"Orbitron,monospace",fontSize:8,color:"#3a6080",marginTop:6,animation:"pu 1.5s ease infinite"}}>ESPERANDO QUE EL HOST INICIE...</div>
      </div>
      <div style={{textAlign:"center",padding:"14px",borderRadius:12,border:"1px solid #1a3a55",marginBottom:20}}>
        <div style={{fontFamily:"Orbitron,monospace",fontSize:8,color:"#3a6080",marginBottom:4}}>CODIGO</div>
        <div style={{fontFamily:"Orbitron,monospace",fontSize:34,fontWeight:900,color:"#00c8ff",letterSpacing:8}}>{code}</div>
      </div>
      <div style={{background:"rgba(255,255,255,.02)",border:"1px solid #1a3a55",borderRadius:10,padding:"14px 12px"}}>
        <div style={{fontFamily:"Orbitron,monospace",fontSize:8,color:"#3a6080",marginBottom:10}}>EN LA SALA ({(lobby.players||[]).length})</div>
        {(lobby.players||[]).map((p,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 10px",borderRadius:8,border:"1px solid rgba("+rgb(p.color?p.color.hex:"#00c8ff")+",.2)",background:"rgba("+rgb(p.color?p.color.hex:"#00c8ff")+",.05)",marginBottom:5}}>
            <span style={{fontSize:20}}>{p.ship}</span>
            <div style={{flex:1}}>
              <div style={{fontFamily:"Orbitron,monospace",fontSize:9,fontWeight:700,color:p.color?p.color.hex:"#00c8ff"}}>{p.name}</div>
              <div style={{fontFamily:"Orbitron,monospace",fontSize:6,color:"#3a6080"}}>J{i+1} - {i<PLANET_START_ORDER.length?PLANET_START_ORDER[i].name:"Extra"}</div>
            </div>
            {i===0&&<div style={{fontFamily:"Orbitron,monospace",fontSize:6,color:"#ffcc00",border:"1px solid #ffcc00",padding:"1px 4px",borderRadius:3}}>HOST</div>}
            <div style={{width:8,height:8,borderRadius:"50%",background:"#00ff9d"}}/>
          </div>
        ))}
      </div>
    </div>
  );
  return(
    <div style={{minHeight:"100dvh",background:"#060c14",fontFamily:"'Exo 2',sans-serif",color:"#c8e8ff",padding:"20px 16px 40px",maxWidth:440,margin:"0 auto"}}>
      <style>{"@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap'); *{box-sizing:border-box} body{margin:0;background:#060c14} @keyframes pu{0%,100%{opacity:.5}50%{opacity:1}}"}</style>
      <button onClick={onBack} style={{background:"transparent",border:"none",color:"#3a6080",fontFamily:"Orbitron,monospace",fontSize:8,cursor:"pointer",marginBottom:16,padding:0}}>← VOLVER</button>
      <div style={{fontFamily:"Orbitron,monospace",fontSize:9,letterSpacing:3,color:"#3a6080",marginBottom:4}}>UNIRSE A PARTIDA</div>
      <div style={{fontFamily:"Orbitron,monospace",fontSize:18,fontWeight:900,color:player.color.hex,marginBottom:24}}>{player.ship} {player.name}</div>
      <div style={{background:"rgba(255,255,255,.02)",border:"1px solid #1a3a55",borderRadius:12,padding:"22px 16px",marginBottom:16}}>
        <div style={{fontFamily:"Orbitron,monospace",fontSize:8,color:"#3a6080",marginBottom:12}}>INGRESA EL CODIGO</div>
        <input value={code} onChange={e=>setCode(e.target.value.replace(/[^0-9]/g,"").slice(0,6))}
          placeholder="000000" maxLength={6} inputMode="numeric"
          style={{width:"100%",padding:"16px",borderRadius:10,border:"2px solid "+(code.length===6?"#00c8ff":"#1a3a55"),background:"rgba(0,0,0,.4)",color:"#00c8ff",fontFamily:"Orbitron,monospace",fontSize:30,letterSpacing:10,textAlign:"center",outline:"none"}}/>
        {err&&<div style={{fontFamily:"Orbitron,monospace",fontSize:7,color:"#ff5555",marginTop:8,textAlign:"center"}}>{err}</div>}
      </div>
      {!fbReady&&<div style={{textAlign:"center",fontFamily:"Orbitron,monospace",fontSize:7,color:"#3a6080",animation:"pu 1.2s ease infinite",marginBottom:10}}>CONECTANDO...</div>}
      <button onClick={handleJoin} disabled={status==="joining"||code.length!==6||!fbReady}
        style={{width:"100%",padding:"16px",borderRadius:10,border:"2px solid "+(code.length===6&&fbReady?"#00c8ff":"#1a3a55"),background:code.length===6&&fbReady?"rgba(0,200,255,.12)":"transparent",fontFamily:"Orbitron,monospace",fontSize:12,letterSpacing:3,color:code.length===6&&fbReady?"#00c8ff":"#2a4060",cursor:code.length===6&&fbReady?"pointer":"default",fontWeight:900,userSelect:"none",WebkitTapHighlightColor:"transparent"}}>
        {!fbReady?"CONECTANDO...":status==="joining"?"BUSCANDO...":"UNIRSE"}
      </button>
    </div>
  );
}

  const [screen,setScreen]=useState("menu");
  const [lobbyData,setLobbyData]=useState(null);
  const [player,setPlayer]=useState(null);
  const [resSlots,setResSlots]=useState(initRes());
  const [roundHistory,setRoundHistory]=useState([]);
  const [currentRound,setCurrentRound]=useState(1);
  const [sequence,setSequence]=useState([]);
  const [unlocked,setUnlocked]=useState([]);
  const [seqHistory,setSeqHistory]=useState([]);
  const [gStats,setGStats]=useState({seqLost:0,fullTrips:0,marketBuys:[],consumablesUsed:0});
  const [ownedPerks,setOwnedPerks]=useState([]);
  const [extraDice,setExtraDice]=useState([]);
  const [boughtNC,setBoughtNC]=useState(0);
  const [consUsed,setConsUsed]=useState(0);
  const [anim,setAnim]=useState(null);
  const [powerAnim,setPowerAnim]=useState(false);
  const [buyAnim,setBuyAnim]=useState(false);
  const [shaking,setShaking]=useState(false);
  const [tab,setTab]=useState("board");
  const [confirm,setConfirm]=useState(null);
  const [showPay,setShowPay]=useState(false);
  const [payPending,setPayPending]=useState(null);
  const [showEndStats,setShowEndStats]=useState(false);
  const [timer,setTimer]=useState(0);
  const play=useAudio();

  useEffect(()=>{ if(screen!=="game") return; const id=setInterval(()=>setTimer(t=>t+1),1000); return()=>clearInterval(id); },[screen]);

  const toggleSlot=(resId,idx)=>{
    setResSlots(prev=>{
      const copy={...prev,[resId]:[...prev[resId]]};
      if(copy[resId][idx]===0){ copy[resId][idx]=1; play(RESOURCES.find(r=>r.id===resId).sound); }
      else{ copy[resId][idx]=0; play("undo"); }
      return copy;
    });
  };

  const handleOrbitTap=(planetId)=>{
    if(sequence.includes(planetId)||sequence.length>=PLANETS.length) return;
    play(PLANETS.find(p=>p.id===planetId).sound||"click");
    const newSeq=[...sequence,planetId];
    setSequence(newSeq);
    if(!unlocked.includes(planetId)) setUnlocked(u=>[...u,planetId]);
    if(newSeq.length===PLANETS.length){
      setAnim("victory"); setTimeout(()=>setAnim(null),2200);
      setGStats(s=>({...s,fullTrips:s.fullTrips+1}));
    }
    setSeqHistory(h=>[...h,{id:planetId,round:currentRound}]);
  };

  const handleLost=()=>{
    setConfirm({msg:"Perder la secuencia actual?",icon:"💀",okLabel:"CONFIRMAR",
      okColor:"rgba(255,100,100,.9)",okBorder:"rgba(255,60,60,.5)",okBg:"rgba(255,30,30,.12)",
      onOk:()=>{
        setAnim("defeat"); setTimeout(()=>setAnim(null),1800);
        setShaking(true); setTimeout(()=>setShaking(false),600);
        setGStats(s=>({...s,seqLost:s.seqLost+1}));
        setSequence([]); setConfirm(null);
      }
    });
  };

  const handleNewRound=()=>{
    const gained=Object.fromEntries(RESOURCES.map(r=>[r.id,resSlots[r.id].filter(v=>v===1).length]));
    const spent=Object.fromEntries(RESOURCES.map(r=>[r.id,0]));
    setRoundHistory(h=>[...h,{gained,spent}]);
    setCurrentRound(r=>r+1);
    setBoughtNC(0); setConsUsed(0);
    setOwnedPerks(p=>p.map(pk=>({...pk,usedThisTurn:false})));
    setAnim("newround"); setTimeout(()=>setAnim(null),950);
    play("newround");
  };

  const handleBuyPerk=(perk,type)=>{
    setResSlots(prev=>{
      const next={...prev};
      perk.cost.forEach(c=>{
        let rem=c.q; const arr=[...next[c.r]];
        for(let i=arr.length-1;i>=0&&rem>0;i--) if(arr[i]===1){arr[i]=0;rem--;}
        next[c.r]=arr;
      });
      return next;
    });
    if(type==="dice"){
      setExtraDice(d=>[...d,perk.id]);
    } else if(type==="consumable"){
      setOwnedPerks(p=>[...p,{...perk,type,usedThisTurn:false}]);
    } else {
      setOwnedPerks(p=>[...p,{...perk,type,usedThisTurn:false}]);
      setBoughtNC(b=>b+1);
    }
    setGStats(s=>({...s,marketBuys:[...s.marketBuys,{name:perk.name,emoji:perk.emoji||"🎲",type,round:currentRound}]}));
    setBuyAnim(true); setTimeout(()=>setBuyAnim(false),1000);
    play("buy");
  };

  const handleUsePerk=(perkId,type)=>{
    if(type==="reusable"){
      setOwnedPerks(p=>p.map(pk=>pk.id===perkId&&!pk.usedThisTurn?{...pk,usedThisTurn:true}:pk));
    } else if(type==="consumable"){
      if(consUsed>=3) return;
      setOwnedPerks(p=>{ const idx=p.findIndex(pk=>pk.id===perkId); return idx>=0?[...p.slice(0,idx),...p.slice(idx+1)]:p; });
      setConsUsed(n=>n+1);
      setGStats(s=>({...s,consumablesUsed:(s.consumablesUsed||0)+1}));
      setPowerAnim(true); setTimeout(()=>setPowerAnim(false),900);
    }
    play("poweruse");
  };

  const handleEndGame=()=>{ play("endgame"); setShowEndStats(true); };

  const resetAll=()=>{
    setShowEndStats(false); setScreen("menu"); setLobbyData(null); setPlayer(null);
    setResSlots(initRes()); setRoundHistory([]); setCurrentRound(1);
    setSequence([]); setUnlocked([]); setSeqHistory([]);
    setGStats({seqLost:0,fullTrips:0,marketBuys:[],consumablesUsed:0});
    setPowerAnim(false); setBuyAnim(false);
    setOwnedPerks([]); setExtraDice([]); setBoughtNC(0); setConsUsed(0);
    setTimer(0); setTab("board");
  };

  const handleShare=async()=>{
    const totG=Object.fromEntries(RESOURCES.map(r=>[r.id,roundHistory.reduce((a,rnd)=>a+(rnd.gained[r.id]||0),0)]));
    const totS=Object.fromEntries(RESOURCES.map(r=>[r.id,roundHistory.reduce((a,rnd)=>a+(rnd.spent[r.id]||0),0)]));
    const resLines=RESOURCES.map(r=>r.icon+" "+r.label+": +"+totG[r.id]+" -"+totS[r.id]+" ="+(totG[r.id]-totS[r.id])).join("\n");
    const route=seqHistory.map((e,i)=>(i+1)+". "+pName(e.id)+" (R"+e.round+")").join(" > ");
    const text="STELLAR EXPLORER\n"+player.ship+" "+player.name+" - "+ft(timer)+" - "+currentRound+" rondas\nPerdidas: "+gStats.seqLost+"\n\nRECURSOS:\n"+resLines+"\n\nRUTA:\n"+(route||"Ninguna");
    try{ if(navigator.share){ await navigator.share({title:"Stellar Explorer",text}); return; } }catch(e){}
    try{ await navigator.clipboard.writeText(text); alert("Copiado!"); }catch(e){}
  };

  // End stats
  if(screen==="game"&&showEndStats&&player){
    return <EndStatsOverlay player={player} roundHistory={roundHistory} gStats={gStats} timer={timer}
      seqHistory={seqHistory} unlocked={unlocked} ownedPerks={ownedPerks} extraDice={extraDice} onClose={resetAll}/>;
  }

  // Screen routing
  if(screen==="menu") return <LobbyMenu onCreate={()=>setScreen("sc")} onJoin={()=>setScreen("sj")} onSolo={()=>setScreen("ss")}/>;
  if(screen==="ss") return <SetupScreen play={play} onStart={p=>{ setPlayer(p); setScreen("game"); }}/>;
  if(screen==="sc") return <SetupScreen play={play} onStart={p=>{ setPlayer(p); setScreen("lc"); }}/>;
  if(screen==="sj") return <SetupScreen play={play} onStart={p=>{ setPlayer(p); setScreen("lj"); }}/>;
  if(screen==="lc"&&player) return <CreateLobby player={player} play={play} onBack={()=>setScreen("sc")} onGameStart={ld=>{ setLobbyData(ld); setCurrentRound(1); setScreen("game"); }}/>;
  if(screen==="lj"&&player) return <JoinLobby player={player} play={play} onBack={()=>setScreen("sj")} onGameStart={ld=>{ setLobbyData(ld); setCurrentRound(1); setScreen("game"); }}/>;
  if(!player) return <LobbyMenu onCreate={()=>setScreen("sc")} onJoin={()=>setScreen("sj")}/>;

  const pColor=player.color.hex;
  const pRgb=rgb(pColor);
  const permCount=ownedPerks.filter(p=>p.type==="permanent").length;
  if(showPay){
    const pending = payPending || Object.fromEntries(RESOURCES.map(r=>[r.id,0]));
    const total = Object.values(pending).reduce((a,b)=>a+b,0);
    const adj = (resId,delta) => {
      const avail = resSlots[resId].filter(v=>v===1).length;
      const cur = pending[resId]||0;
      setPayPending({...pending,[resId]:Math.max(0,Math.min(avail,cur+delta))});
    };
    const confirmPay = () => {
      if(total===0) return;
      setResSlots(prev=>{
        const next={...prev};
        RESOURCES.forEach(res=>{
          let rem=pending[res.id]||0; const arr=[...next[res.id]];
          for(let i=arr.length-1;i>=0&&rem>0;i--) if(arr[i]===1){arr[i]=0;rem--;}
          next[res.id]=arr;
        });
        return next;
      });
      setPayPending(null); setShowPay(false);
    };
    return(
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",display:"flex",alignItems:"flex-end",zIndex:100}} onClick={()=>{setShowPay(false);setPayPending(null);}}>
        <div style={{width:"100%",maxWidth:440,margin:"0 auto",background:"#0a1520",borderRadius:"18px 18px 0 0",padding:"20px 16px 36px"}} onClick={e=>e.stopPropagation()}>
          <div style={{fontFamily:"Orbitron,monospace",fontSize:9,letterSpacing:3,color:"#3a6080",marginBottom:16,textAlign:"center"}}>PAGAR RECURSOS</div>
          {RESOURCES.map(res=>{
            const avail=resSlots[res.id].filter(v=>v===1).length;
            const amt=pending[res.id]||0;
            return(
              <div key={res.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                <span style={{fontSize:18,width:24}}>{res.icon}</span>
                <div style={{fontFamily:"Orbitron,monospace",fontSize:7,color:res.color,flex:1}}>{res.label}</div>
                <div style={{fontFamily:"Orbitron,monospace",fontSize:8,color:"#3a6080",width:28,textAlign:"center"}}>{avail}</div>
                <button onClick={()=>adj(res.id,-1)} style={{width:30,height:30,borderRadius:7,border:"1.5px solid "+(amt>0?"rgba(255,80,50,.5)":"#1a3a55"),background:amt>0?"rgba(255,50,20,.15)":"transparent",color:amt>0?"#ff7755":"#2a4060",fontSize:18,cursor:amt>0?"pointer":"default",display:"flex",alignItems:"center",justifyContent:"center",userSelect:"none",WebkitTapHighlightColor:"transparent"}}>-</button>
                <div style={{fontFamily:"Orbitron,monospace",fontSize:14,fontWeight:700,color:amt>0?"#ff9955":"#3a6080",width:24,textAlign:"center"}}>{amt}</div>
                <button onClick={()=>adj(res.id,1)} style={{width:30,height:30,borderRadius:7,border:"1.5px solid "+(amt<avail?"rgba(0,200,100,.5)":"#1a3a55"),background:amt<avail?"rgba(0,180,80,.15)":"transparent",color:amt<avail?"#44ff88":"#2a4060",fontSize:18,cursor:amt<avail?"pointer":"default",display:"flex",alignItems:"center",justifyContent:"center",userSelect:"none",WebkitTapHighlightColor:"transparent"}}>+</button>
              </div>
            );
          })}
          <div style={{display:"flex",gap:10,marginTop:16}}>
            <button onClick={()=>{setShowPay(false);setPayPending(null);}} style={{flex:1,padding:"11px",borderRadius:9,border:"1px solid #1a3a55",background:"transparent",fontFamily:"Orbitron,monospace",fontSize:9,color:"#3a6080",cursor:"pointer",userSelect:"none",WebkitTapHighlightColor:"transparent"}}>CANCELAR</button>
            <button onClick={confirmPay} style={{flex:2,padding:"11px",borderRadius:9,border:"1.5px solid "+(total>0?"rgba(255,150,60,.5)":"#1a3a55"),background:total>0?"rgba(255,100,30,.1)":"transparent",fontFamily:"Orbitron,monospace",fontSize:9,color:total>0?"rgba(255,170,90,.9)":"#2a4060",cursor:total>0?"pointer":"default",fontWeight:700,userSelect:"none",WebkitTapHighlightColor:"transparent"}}>
              PAGAR {total>0?"("+total+")":""}
            </button>
          </div>
        </div>
      </div>
    );
  }

  // Confirm modal
  if(confirm){
    return(
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px",zIndex:100}}>
        <div style={{width:"100%",maxWidth:340,background:"#0a1520",borderRadius:16,padding:"24px 20px",border:"1px solid #1a3a55"}}>
          <div style={{textAlign:"center",fontSize:36,marginBottom:12}}>{confirm.icon}</div>
          <div style={{fontFamily:"Orbitron,monospace",fontSize:8,color:"#c8e8ff",textAlign:"center",lineHeight:1.8,marginBottom:20}}>{confirm.msg}</div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setConfirm(null)} style={{flex:1,padding:"11px",borderRadius:9,border:"1px solid #1a3a55",background:"transparent",fontFamily:"Orbitron,monospace",fontSize:8,color:"#3a6080",cursor:"pointer",userSelect:"none",WebkitTapHighlightColor:"transparent"}}>CANCELAR</button>
            <button onClick={confirm.onOk} style={{flex:1,padding:"11px",borderRadius:9,border:"1.5px solid "+confirm.okBorder,background:confirm.okBg,fontFamily:"Orbitron,monospace",fontSize:8,color:confirm.okColor,cursor:"pointer",fontWeight:700,userSelect:"none",WebkitTapHighlightColor:"transparent"}}>{confirm.okLabel}</button>
          </div>
        </div>
      </div>
    );
  }

  return(
    <div style={{maxWidth:440,margin:"0 auto",minHeight:"100dvh",background:"#060c14",display:"flex",flexDirection:"column",fontFamily:"'Exo 2',sans-serif",color:"#c8e8ff",position:"relative"}}>
      <style>{"@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap'); *{box-sizing:border-box} body{margin:0;background:#060c14}"}</style>
      {anim==="newround"&&<NewRoundFlash/>}
      {anim&&anim!=="newround"&&<Particles type={anim}/>}
      {powerAnim&&<PowerBurst/>}
      {buyAnim&&<BuyBurst/>}

      <div style={{padding:"10px 14px 8px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid #1a3a55"}}>
        <div style={{display:"flex",alignItems:"center",gap:9}}>
          <div style={{fontSize:22}}>{player.ship}</div>
          <div>
            <div style={{fontFamily:"Orbitron,monospace",fontSize:12,fontWeight:900,color:pColor,letterSpacing:2,textShadow:"0 0 10px rgba("+pRgb+",.5)"}}>{player.name}</div>
            <div style={{fontFamily:"Orbitron,monospace",fontSize:6.5,color:"#3a6080",letterSpacing:1}}>
              R{currentRound}{lobbyData?" - "+lobbyData.code:""} - {unlocked.length}/7 - 🎲{3+extraDice.length}
            </div>
          </div>
        </div>
        <button onClick={handleEndGame} style={{padding:"6px 9px",borderRadius:7,border:"1.5px solid rgba(255,150,50,.4)",background:"rgba(255,100,20,.08)",fontFamily:"Orbitron,monospace",fontSize:6.5,letterSpacing:1,color:"rgba(255,160,70,.9)",cursor:"pointer",userSelect:"none",WebkitTapHighlightColor:"transparent"}}>FIN</button>
      </div>

      <div style={{display:"flex",padding:"7px 14px 0",gap:5}}>
        {TABS.map(t=>(
          <div key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"6px 4px",borderRadius:8,textAlign:"center",border:"1.5px solid "+(tab===t.id?pColor:"#1a3a55"),background:tab===t.id?"rgba("+pRgb+",.08)":"transparent",cursor:"pointer",userSelect:"none",WebkitTapHighlightColor:"transparent"}}>
            <div style={{fontSize:15,lineHeight:1,marginBottom:2}}>{t.icon}</div>
            <div style={{fontFamily:"Orbitron,monospace",fontSize:6.5,letterSpacing:1.5,color:tab===t.id?pColor:"#3a6080"}}>{t.label}</div>
          </div>
        ))}
      </div>

      <div style={{flex:1,padding:"11px 14px 32px",overflowY:"auto"}}>
        {tab==="board"&&(<>
          {lobbyData&&(
            <div style={{padding:"7px 12px",borderRadius:8,border:"1px solid rgba(0,200,255,.2)",background:"rgba(0,200,255,.05)",marginBottom:10,display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:18}}>{(PLANETS.find(p=>p.id===lobbyData.myPlanetId)||{icon:"🌌"}).icon}</span>
              <div>
                <div style={{fontFamily:"Orbitron,monospace",fontSize:7,color:"#3a6080"}}>PLANETA INICIAL</div>
                <div style={{fontFamily:"Orbitron,monospace",fontSize:10,fontWeight:700,color:"#00c8ff"}}>{lobbyData.myPlanet||"VERDIA"}</div>
              </div>
              <div style={{marginLeft:"auto",fontFamily:"Orbitron,monospace",fontSize:6.5,color:"#3a6080"}}>{lobbyData.isHost?"HOST":"JUGADOR"} #{lobbyData.code}</div>
            </div>
          )}
          {(ownedPerks.length>0||extraDice.length>0)&&(
            <>
              <ActivePerks ownedPerks={ownedPerks} onUsePerk={handleUsePerk} consumablesUsedThisTurn={consUsed} extraDice={extraDice}/>
              <div style={{height:1,background:"linear-gradient(90deg,transparent,#1a3a55,transparent)",margin:"12px 0"}}/>
            </>
          )}
          <div style={{display:"flex",gap:8,marginBottom:10,alignItems:"center"}}>
            <div style={{flex:1,padding:"7px 11px",borderRadius:8,border:"1px solid rgba("+pRgb+",.2)",background:"rgba("+pRgb+",.05)",fontFamily:"Orbitron,monospace",fontSize:8,color:pColor,letterSpacing:2}}>RONDA {currentRound}</div>
            <button onClick={handleNewRound} style={{padding:"7px 12px",borderRadius:8,border:"1.5px solid "+pColor,background:"rgba("+pRgb+",.1)",fontFamily:"Orbitron,monospace",fontSize:8,color:pColor,cursor:"pointer",userSelect:"none",WebkitTapHighlightColor:"transparent"}}>+ RONDA</button>
          </div>
          <div style={{fontFamily:"Orbitron,monospace",fontSize:8,letterSpacing:3,color:"#3a6080",marginBottom:4}}>RECURSOS</div>
          <div style={{fontFamily:"Orbitron,monospace",fontSize:6.5,color:"#1a4a6a",marginBottom:9}}>TAP = MARCAR - TAP VERDE = DESMARCAR</div>
          {RESOURCES.map(res=><ResourceRow key={res.id} res={res} slots={resSlots[res.id]} onToggle={i=>toggleSlot(res.id,i)}/>)}
          <button onClick={()=>setShowPay(true)} style={{width:"100%",padding:"11px",borderRadius:9,border:"1.5px solid rgba(255,150,60,.5)",background:"rgba(255,100,30,.08)",display:"flex",alignItems:"center",justifyContent:"center",gap:10,cursor:"pointer",userSelect:"none",WebkitTapHighlightColor:"transparent",marginTop:4,marginBottom:14}}>
            <span style={{fontSize:17}}>💸</span><span style={{fontFamily:"Orbitron,monospace",fontSize:9,letterSpacing:3,color:"rgba(255,170,90,.9)",fontWeight:700}}>PAGAR RECURSOS</span><span style={{fontSize:17}}>💸</span>
          </button>
          <div style={{height:1,background:"linear-gradient(90deg,transparent,#1a3a55,transparent)",margin:"0 0 14px"}}/>
          <PlanetSection sequence={sequence} unlocked={unlocked} onOrbitTap={handleOrbitTap} onSeqRemove={pid=>setSequence(s=>s.filter(p=>p!==pid))} shaking={shaking}/>
          <div style={{height:1,background:"linear-gradient(90deg,transparent,#1a3a55,transparent)",margin:"14px 0"}}/>
          <div onClick={handleLost} style={{width:"100%",padding:"11px",borderRadius:8,border:"1.5px solid rgba(255,60,60,.35)",background:"rgba(255,30,30,.07)",display:"flex",alignItems:"center",justifyContent:"center",gap:10,cursor:"pointer",userSelect:"none",WebkitTapHighlightColor:"transparent"}}>
            <span style={{fontSize:15}}>💀</span><span style={{fontFamily:"Orbitron,monospace",fontSize:9,letterSpacing:3,color:"rgba(255,100,100,.85)",fontWeight:700}}>SECUENCIA PERDIDA</span><span style={{fontSize:15}}>💀</span>
          </div>
        </>)}
        {tab==="market"&&(
          <MarketTab resSlots={resSlots} unlocked={unlocked} ownedPerks={ownedPerks}
            boughtNC={boughtNC} consumablesUsed={consUsed}
            onBuy={handleBuyPerk} onUsePerk={handleUsePerk} extraDice={extraDice}/>
        )}
        {tab==="stats"&&(
          <StatsScreen roundHistory={roundHistory} gStats={gStats} timer={timer} seqHistory={seqHistory}
            unlocked={unlocked} ownedPerks={ownedPerks} extraDice={extraDice} player={player}
            onShare={handleShare} currentRound={currentRound}/>
        )}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
